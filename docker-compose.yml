services:
  guestbook:
    build: .
    container_name: guestbook
    ports:
      - "${GUESTBOOK_PORT:-8000}:${GUESTBOOK_PORT:-8000}"
    env_file:
      - .env
    volumes:
      - guestbook-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${GUESTBOOK_PORT:-8000}/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Optional: Use PostgreSQL instead of SQLite
  # Activate with: docker compose --profile postgres up
  postgres:
    image: postgres:16-alpine
    profiles:
      - postgres
    environment:
      POSTGRES_DB: guestbook
      POSTGRES_USER: guestbook
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guestbook"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  guestbook-data:
  postgres-data:
