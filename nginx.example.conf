# Guestbook — nginx reverse proxy configuration
#
# This config provides:
# - SSL termination with Let's Encrypt certificates
# - Proxy to the Guestbook app on port 8000
# - Proper forwarded headers for correct URL generation
# - Security defaults
#
# Usage:
# 1. Replace YOUR_DOMAIN with your actual domain
# 2. Obtain SSL certs via certbot: certbot certonly --nginx -d YOUR_DOMAIN
# 3. Copy this file to /etc/nginx/sites-available/guestbook
# 4. Symlink: ln -s /etc/nginx/sites-available/guestbook /etc/nginx/sites-enabled/
# 5. Test: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers (some may be set by the app — nginx adds defense in depth)
    server_tokens off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Max upload size (increase if you plan to support file uploads)
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8000;

        # Forward headers so the app knows the real client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for potential future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Serve static files directly (optional optimization)
    # Uncomment if you mount the static directory into nginx
    # location /static/ {
    #     alias /path/to/guestbook/src/guestbook/static/;
    #     expires 7d;
    #     add_header Cache-Control "public, immutable";
    # }
}
